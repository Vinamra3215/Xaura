# Ruff configuration for XAURA
# https://docs.astral.sh/ruff/configuration/

# Target Python 3.10+
target-version = "py310"

# Line length to match Black
line-length = 100

# Source directories
src = ["src"]

[lint]
# Enable common rule sets
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort (import sorting)
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
]
ignore = [
    "E501",   # line too long — handled by black/ruff-format
    "N803",   # argument name should be lowercase — ML convention uses X, X_train
    "N806",   # variable name should be lowercase — ML convention uses X, X_train
    "B007",   # loop variable not used — false positive in registry iteration
]

[lint.isort]
known-first-party = ["xaura"]

[format]
# Use double quotes to match Black
quote-style = "double"
indent-style = "space"
