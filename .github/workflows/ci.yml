name: Continuous Integration

# Trigger the CI on pushes to main or when a PR is opened against main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # --- PYTHON CI JOB ---
  python-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Install testing tools. If you have a requirements.txt, uncomment the line below:
          # pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint with flake8 (Syntax & Style Check)
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run Python Tests
        run: |
          # This will look for any files named test_*.py and run them
          pytest

  # --- C++ CI JOB ---
  cpp-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake

      - name: Configure CMake
        # This checks if your CMakeLists.txt is valid and sets up the build directory
        run: cmake -B build -S .

      - name: Build Project
        # This attempts to compile your C++ code
        run: cmake --build build